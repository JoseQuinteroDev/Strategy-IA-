benchmark: baseline_azir_protected_economic_v1
risk_engine: risk_engine_azir_v1

splits:
  train_ratio: 0.60
  validation_ratio: 0.20
  test_ratio: 0.20

ppo:
  policy: MlpPolicy
  total_timesteps: 5000
  learning_rate: 0.0003
  n_steps: 64
  batch_size: 64
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.01
  clip_range: 0.2
  eval_freq: 1000
  checkpoint_freq: 1000
  device: auto
  verbose: 0
  seeds:
    - 7
    - 11
    - 17

controls:
  random_valid_seeds:
    - 101
    - 202
    - 303
    - 404
    - 505
