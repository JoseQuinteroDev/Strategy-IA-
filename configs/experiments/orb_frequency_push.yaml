    label: Conservative width_wider control
    candidate: false
    overrides:
      strategy:
        minimum_opening_range_width_atr: 0.40
        maximum_opening_range_width_atr: 2.80
        max_breakout_distance_atr: 0.35
        max_breakouts_per_day: 3
        signal_cooldown_bars: 3
        no_entry_minutes_before_close: 20
      risk:
        max_trades_per_day: 3

