  minimum_trades_per_year: 15.0
  target_trades_per_week_avg: 1.0
  ambitious_trades_per_week_avg: 2.0
  minimum_profit_factor: 1.10
  minimum_expectancy_ratio_vs_reference: 0.70
  minimum_profit_factor_ratio_vs_reference: 0.85
  maximum_drawdown_multiple_vs_reference: 2.50
  minimum_positive_year_ratio: 0.50
  minimum_positive_quarter_ratio: 0.35
  maximum_year_net_pnl_concentration: 0.80

