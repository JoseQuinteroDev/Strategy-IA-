market:
  symbol: NQ
  venue: cme
  execution_timeframe: 5m
  filter_timeframe: 1H
  style: intraday

data:
  provider: local_file
  allow_gaps: true

features:
  enabled:
    - atr_14
    - ema_200_1h
    - ema_200_1h_slope
    - intraday_vwap
    - ema_20
    - ema_50
    - candle_range
    - candle_range_pct
    - candle_range_atr
    - momentum_20
    - relative_volume
    - opening_range_high
    - opening_range_low
    - opening_range_mid
    - opening_range_width
    - opening_range_width_atr
    - opening_range_ready
    - context_bias_side
    - context_long_pullback_entry
    - context_short_pullback_entry
    - context_long_reclaim_entry
    - context_short_reclaim_entry
    - context_long_session_trend_entry
    - context_short_session_trend_entry
    - context_support_level
    - context_trigger_level
    - context_support_distance_atr
    - context_trigger_distance_atr
    - context_session_high_so_far
    - context_session_low_so_far
    - context_session_range_width_atr
    - context_setup_count_today
    - context_first_setup_of_day
    - hour_utc
    - day_of_week
    - session_asia
    - session_europe
    - session_us
  ema_slope_lookback_hours: 3
  relative_volume_lookback_sessions: 20

strategy:
  family: intraday_nasdaq_contextual
  name: intraday_nasdaq_contextual_nq
  variant_name: baseline_nq_intraday_contextual
  trend_filter: ema_200_1h
  regime_filter: null
  entry_mode: context_pullback_continuation
  opening_range_minutes: 30
  retest_max_bars: 6
  signal_cooldown_bars: 1
  momentum_lookback_bars: 20
  breakout_buffer_atr: 0.08
  atr_multiple_stop: 1.0
  atr_multiple_target: 1.8
  time_stop_bars: 14
  use_ema_200_1h_slope: true
  use_intraday_vwap_filter: true
  use_intraday_ema20_filter: true
  session_close_hour_utc: 20
  session_close_minute_utc: 55
  no_entry_minutes_before_close: 15
  allowed_weekdays:
    - 0
    - 1
    - 2
    - 3
    - 4
  allowed_hours_utc:
    - 14
    - 15
    - 16
    - 17
    - 18
    - 19
  exclude_weekends: true
  minimum_expected_move_bps: 6.0
  minimum_target_to_cost_ratio: 1.25
  minimum_momentum_abs: 0.0008
  minimum_candle_range_atr: 0.35
  minimum_opening_range_width_atr: 0.20
  maximum_opening_range_width_atr: 3.50
  minimum_relative_volume: 0.70
  max_breakout_distance_atr: 0.70
  max_breakouts_per_day: 4

risk:
  session_start_hour_utc: 13
  session_start_minute_utc: 30
  session_end_hour_utc: 20
  session_end_minute_utc: 55
  max_trades_per_day: 4

backtest:
  fee_bps: 0.10
  slippage_bps: 0.35
