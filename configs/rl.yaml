rl:
  enabled: false
  algorithm: PPO
  checkpoint_dir: artifacts/rl
  total_timesteps: 20000
  seeds:
    - 7
    - 11
  policy: MlpPolicy
  learning_rate: 0.0003
  n_steps: 128
  batch_size: 64
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.0
  clip_range: 0.2
  eval_freq: 5000
  checkpoint_freq: 5000
  n_eval_episodes: 1
  train_split: train
  eval_split: validation
  test_split: test
  device: auto
  verbose: 1
  tensorboard_log_dir: artifacts/rl/tensorboard
